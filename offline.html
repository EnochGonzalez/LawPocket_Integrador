<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="color-scheme" content="only light">
    <meta name="theme-color" content="#14213d">
    <title>LawPocket | Sin conexión</title>
    <!-- Página de respaldo cuando se navega a una ruta que no está
         en caché y no hay internet. No usa NINGÚN archivo externo
         (ni fuentes ni librerías) para que siempre pueda mostrarse. -->
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', sans-serif;
            background: #f8fafc; color: #0f172a; min-height: 100vh;
            display: flex; align-items: center; justify-content: center; padding: 1.5rem;
        }
        .tarjeta {
            background: #fff; border: 1px solid #f1f5f9; border-radius: 16px;
            box-shadow: 0 1px 2px rgba(0,0,0,0.04); padding: 2.5rem 2rem;
            max-width: 440px; width: 100%; text-align: center;
        }
        .icono {
            width: 64px; height: 64px; border-radius: 50%; background: #d1fae5;
            display: flex; align-items: center; justify-content: center; margin: 0 auto 1.2rem;
        }
        .icono svg { width: 30px; height: 30px; stroke: #059669; }
        h1 { color: #14213d; font-size: 1.2rem; margin-bottom: 0.6rem; }
        p { color: #475569; font-size: 0.95rem; line-height: 1.5; margin-bottom: 1.5rem; }
        a.boton {
            display: inline-flex; align-items: center; justify-content: center;
            background: #10B981; color: #fff; text-decoration: none; font-weight: 600;
            font-size: 0.9rem; padding: 0.65rem 1.4rem; border-radius: 8px;
        }
        a.boton:hover { background: #059669; }
    </style>
</head>
<body>
    <div class="tarjeta">
        <div class="icono">
            <!-- Icono wifi-off dibujado a mano (sin depender de Lucide) -->
            <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <line x1="2" y1="2" x2="22" y2="22"/>
                <path d="M8.5 16.5a5 5 0 0 1 7 0"/>
                <path d="M2 8.82a15 15 0 0 1 4.17-2.65"/>
                <path d="M10.66 5c4.01-.36 8.14.9 11.34 3.76"/>
                <path d="M16.85 11.25a10 10 0 0 1 2.22 1.68"/>
                <path d="M5 13a10 10 0 0 1 5.24-2.76"/>
                <line x1="12" y1="20" x2="12.01" y2="20"/>
            </svg>
        </div>
        <h1>Estás sin conexión</h1>
        <p>Esta página no está guardada para uso offline. Revisa tu conexión a internet, o consulta los documentos que ya descargaste en "Mis Descargas".</p>
        <a class="boton" href="Paginas/MisDescargasAdmin.html">Ir a Mis Descargas</a>
    </div>
</body>
</html>

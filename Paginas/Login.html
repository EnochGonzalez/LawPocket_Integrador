<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="color-scheme" content="only light">
    <title>LawPocket | Iniciar Sesión</title>
    <!-- PWA: ficha de instalación, color de la barra e ícono de iOS -->
    <link rel="manifest" href="../manifest.webmanifest">
    <meta name="theme-color" content="#14213d">
    <link rel="apple-touch-icon" href="../Imagenes/icono-apple.png">
    <link rel="stylesheet" href="../lib/fuentes/inter.css">
    <link rel="stylesheet" href="../CSS/Login.css">
    <script src="../lib/lucide.min.js"></script>
</head>
<body>

    <!-- Link para regresar a la página principal -->
    <a href="index.html" class="back-link">
        <i data-lucide="arrow-left"></i>
        <span>Regresar a la página principal</span>
    </a>

    <!-- ================= TARJETA DE LOGIN ================= -->
    <div class="login-card">
        <!-- Logo LawPocket -->
        <div class="login-logo">
            <i data-lucide="scale"></i>
            <span>LawPocket</span>
        </div>

        <h1>Bienvenido</h1>
        <p>Ingresa tus credenciales para continuar</p>

        <!-- Formulario de inicio de sesión (novalidate: la validación la hace el JS) -->
        <form id="loginForm" novalidate>
            <!-- Campo: ID de usuario o correo -->
            <div class="field">
                <label for="userId" id="userIdLabel">ID de usuario o correo:</label>
                <input type="text" id="userId" placeholder="Ej. ABG042 o ADMIN01" autocomplete="username">
                <p class="field-error" id="userIdError" style="display:none;"></p>
            </div>

            <!-- Campo: Contraseña -->
            <div class="field">
                <label for="password" id="passwordLabel">Contraseña:</label>
                <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">
                <p class="field-error" id="passwordError" style="display:none;"></p>
            </div>

            <!-- Error general (credenciales incorrectas) -->
            <div class="form-error" id="formError" style="display:none;">
                <i data-lucide="alert-circle"></i>
                <p id="formErrorText"></p>
            </div>

            <button type="submit" class="btn-submit">Entrar</button>
        </form>

        <p class="login-footer">Sistema interno · Corporativo Jurídico Fusión TGZ</p>
    </div>

    <!-- ================= LÓGICA DEL LOGIN ================= -->
    <script>
        // Inicializar los iconos de la librería Lucide
        lucide.createIcons();

        // Referencias a los elementos del formulario
        const form = document.getElementById('loginForm');
        const userIdInput = document.getElementById('userId');
        const passwordInput = document.getElementById('password');
        const userIdLabel = document.getElementById('userIdLabel');
        const passwordLabel = document.getElementById('passwordLabel');
        const userIdError = document.getElementById('userIdError');
        const passwordError = document.getElementById('passwordError');
        const formError = document.getElementById('formError');
        const formErrorText = document.getElementById('formErrorText');

        // Quita el estado de error de un campo 
        function clearFieldError(input, label, errorEl) {
            input.classList.remove('input-error');
            label.classList.remove('error-label');
            errorEl.style.display = 'none';
            errorEl.textContent = '';
        }

        // Marca un campo con error 
        function setFieldError(input, label, errorEl, message) {
            input.classList.add('input-error');
            label.classList.add('error-label');
            errorEl.style.display = 'block';
            errorEl.textContent = message;
        }

        // Al escribir en un campo con error, se limpia su estado de error
        userIdInput.addEventListener('input', () => {
            if (userIdInput.classList.contains('input-error')) {
                clearFieldError(userIdInput, userIdLabel, userIdError);
            }
        });

        passwordInput.addEventListener('input', () => {
            if (passwordInput.classList.contains('input-error')) {
                clearFieldError(passwordInput, passwordLabel, passwordError);
            }
        });

        // Usuarios de prueba 
        const USERS = {
            'ADMIN01': { password: '123', role: 'admin', name: 'González Velasco Santos Enoch', redirect: 'PanelAnaliticoAdmin.html' },
            'ABG01':   { password: '123', role: 'abogado', name: 'Nucamendi Ruiz Leonardo', redirect: 'AgendaAbogado.html' },
            'ABG02':   { password: '123', role: 'abogado', name: 'Rodriguez Cruz Pablo Isaias', redirect: 'AgendaAbogado.html' },
            'ABG03':   { password: '123', role: 'abogado', name: 'González Pérez Santos Enoch', redirect: 'AgendaAbogado.html' },
        };

        // Envío del formulario: valida campos, verifica credenciales y redirige según el rol del usuario
        form.addEventListener('submit', (e) => {
            e.preventDefault(); // Evitar que la página se recargue

            // Limpiar errores de intentos anteriores
            formError.style.display = 'none';
            clearFieldError(userIdInput, userIdLabel, userIdError);
            clearFieldError(passwordInput, passwordLabel, passwordError);

            // Validar que los campos no estén vacíos
            let hasError = false;

            if (!userIdInput.value.trim()) {
                setFieldError(userIdInput, userIdLabel, userIdError, 'ID de usuario o correo obligatorio');
                hasError = true;
            }

            if (!passwordInput.value.trim()) {
                setFieldError(passwordInput, passwordLabel, passwordError, 'Contraseña obligatoria');
                hasError = true;
            }

            if (hasError) return;

            // Buscar el usuario y comparar la contraseña
            const id = userIdInput.value.trim().toUpperCase();
            const password = passwordInput.value;
            const user = USERS[id];

            // Credenciales correctas: guardar sesión y redirigir a su página
            if (user && user.password === password) {
                sessionStorage.setItem('lawpocket_user', id);
                sessionStorage.setItem('lawpocket_role', user.role);
                sessionStorage.setItem('lawpocket_name', user.name);
                window.location.href = user.redirect;
                return;
            }

            // Credenciales incorrectas: mostrar el error general
            formErrorText.textContent = 'Error: El ID de usuario o la contraseña son incorrectos. Por favor, verifique sus credenciales.';
            formError.style.display = 'flex';
        });
    </script>
    <!-- PWA: registro del service worker (consulta offline) -->
    <script src="../JS/sw-register.js"></script>
</body>
</html>
